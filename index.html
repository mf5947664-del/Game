<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سباق التحدي | ألعاب ويب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="ui-panel">
            <div class="score-board">النتيجة: <span id="scoreVal">0</span></div>
            <div class="instructions">استخدم الأسهم (⬅️ ➡️) للتحرك</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="overlay" class="overlay">
            <h1>انتهت اللعبة!</h1>
            <p>لقد سجلت: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">إعادة المحاولة</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
